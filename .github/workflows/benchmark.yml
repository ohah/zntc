name: Benchmark

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/benchmark/**'
      - '.github/workflows/benchmark.yml'
      - '.github/actions/bun-cache/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write

jobs:
  benchmark:
    name: Benchmark (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # ubuntu-latest 만 — 회귀 게이트(check-regression.ts)가 ubuntu JSON 만 읽고,
        # macOS/Windows 공유 runner 는 run 마다 2~3배 출렁여 추세 신뢰 불가(노이즈).
        # 전체 OS wall-time 비교가 필요하면 workflow_dispatch 로 수동 실행.
        os: [ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          cache-key: benchmark

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - uses: ./.github/actions/bun-cache

      - name: Build ZNTC (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast

      - name: Install benchmark dependencies
        run: bun install --cwd tests/benchmark --frozen-lockfile

      - name: Build NAPI module (Windows, MinGW ABI)
        if: runner.os == 'Windows'
        run: zig build napi --cache-dir .zig-cache-napi -Dtarget=x86_64-windows-gnu

      - name: Build NAPI module
        if: runner.os != 'Windows'
        run: zig build napi --cache-dir .zig-cache-napi

      - name: Build WASM module
        run: zig build wasm
        continue-on-error: true

      - name: Run CLI benchmark
        shell: bash
        run: |
          cd tests/benchmark
          # --json: regression 게이트가 읽을 구조화 결과(median ms). stdout 마크다운은 그대로.
          bun run bench.ts --json bench-results-${{ matrix.os }}.json 2>&1 | tee bench-output.txt

      - name: Run NAPI vs WASM vs CLI benchmark
        shell: bash
        run: |
          cd tests/benchmark
          bun run napi-bench.ts 2>&1 | tee -a bench-output.txt

      - name: Run bundle perf tool comparison
        # 같은 CI 머신에서 ZNTC / Rolldown / Rspack wall time 을 비교한다.
        # 체크인된 bundle-perf baseline 은 쓰지 않고, JSON 결과는 artifact 로 트렌드 추적.
        shell: bash
        run: |
          cd tests/benchmark
          bun run bundle-perf.ts --no-fail --output bundle-perf-${{ matrix.os }}.json 2>&1 | tee -a bench-output.txt

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.os }}
          path: |
            tests/benchmark/bench-output.txt
            tests/benchmark/bench-results-${{ matrix.os }}.json
            tests/benchmark/bundle-perf-${{ matrix.os }}.json

  comment:
    name: Post Results
    needs: benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        # check-regression.ts + ratio baseline 을 쓰기 위한 체크아웃 (submodule 불필요)
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Regression gate (soft — ubuntu-latest, ratio vs baseline)
        id: gate
        shell: bash
        run: |
          GATE_FILE=$(mktemp)
          # 권위 runner = ubuntu-latest (가장 안정). 비율 기준이라 runner 노이즈에 강함.
          UBUNTU_JSON="results/benchmark-ubuntu-latest/bench-results-ubuntu-latest.json"
          # SOFT 게이트: 스크립트가 어떤 이유로 실패해도 댓글은 항상 나가야 하므로 || true.
          # check-regression.ts 는 회귀 의심 시 마크다운 경고를 --out 파일에 쓴다(없으면 빈).
          bun run tests/benchmark/check-regression.ts "$UBUNTU_JSON" --out "$GATE_FILE" || true
          echo "gate_file=${GATE_FILE}" >> "$GITHUB_OUTPUT"

      - name: Build comment body
        id: body
        shell: bash
        run: |
          BODY_FILE=$(mktemp)
          {
            echo "## Benchmark Results (CI)"
            echo ""
            echo "> 신뢰선: **ubuntu-latest** 가 권위 runner(가장 안정적). macOS 공유 runner 는 run 마다 2~3배 출렁이니 절대 ms 보다 \`vs fastest\` 비율로 보세요. 회귀 게이트는 ubuntu 의 esbuild/Bun 대비 비율 기준."
            echo ""
            # 회귀 게이트 결과를 맨 위에 (의심 시 ⚠️ 표, 정상 시 ✅ 한 줄)
            if [ -s "${{ steps.gate.outputs.gate_file }}" ]; then
              cat "${{ steps.gate.outputs.gate_file }}"
              echo ""
            fi
            echo "> Note: bundle-perf now reports same-run CI wall-time comparisons for ZNTC / Rolldown / Rspack. There is no checked-in bundle-perf baseline or PR-base delta."
            echo ""
          } >> "$BODY_FILE"
          # 권위 runner(ubuntu) 를 먼저, 그다음 macos/windows. (이전엔 glob 알파벳순이라
          # 가장 노이즈 큰 macos 가 맨 위에 나와 추세 오판을 유발했음.)
          for os in ubuntu-latest macos-latest windows-latest; do
            dir="results/benchmark-${os}/"
            [ -d "$dir" ] || continue
            {
              echo "### ${os}"
              echo ""
              grep -E '^(\||###|$)' "${dir}bench-output.txt"
              echo ""
            } >> "$BODY_FILE"
          done
          echo "> Auto-generated by CI on $(date -u +'%Y-%m-%d %H:%M UTC')" >> "$BODY_FILE"
          echo "body_file=${BODY_FILE}" >> "$GITHUB_OUTPUT"

      - name: Find existing comment
        id: find
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## Benchmark Results (CI)'

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: ${{ steps.body.outputs.body_file }}
          edit-mode: replace
