name: Benchmark

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/benchmark/**'
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  benchmark:
    name: Benchmark (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build ZTS (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast

      - name: Install benchmark dependencies
        run: bun install --cwd tests/benchmark

      - name: Build NAPI module (Windows, MinGW ABI)
        if: runner.os == 'Windows'
        run: zig build napi -Dtarget=x86_64-windows-gnu

      - name: Build NAPI module
        if: runner.os != 'Windows'
        run: zig build napi

      - name: Build WASM module
        run: zig build wasm
        continue-on-error: true

      - name: Run CLI benchmark
        shell: bash
        run: |
          cd tests/benchmark
          bun run bench.ts 2>&1 | tee bench-output.txt

      - name: Run NAPI vs WASM vs CLI benchmark
        shell: bash
        run: |
          cd tests/benchmark
          bun run napi-bench.ts 2>&1 | tee -a bench-output.txt

      - name: Run bundle perf regression check
        # baseline 은 dev 머신 절대값 — CI 머신과 다르므로 회귀 비교는 informational.
        # `--no-fail` 로 회귀 시도 CI 통과, JSON 결과는 artifact 로 트렌드 추적.
        shell: bash
        run: |
          cd tests/benchmark
          bun run bundle-perf.ts --no-fail --output bundle-perf-${{ matrix.os }}.json 2>&1 | tee -a bench-output.txt

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.os }}
          path: |
            tests/benchmark/bench-output.txt
            tests/benchmark/bundle-perf-${{ matrix.os }}.json

  comment:
    name: Post Results
    needs: benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Build comment body
        id: body
        shell: bash
        run: |
          BODY_FILE=$(mktemp)
          echo "## Benchmark Results (CI)" >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          for dir in results/benchmark-*/; do
            os=$(basename "$dir" | sed 's/benchmark-//')
            echo "### ${os}" >> "$BODY_FILE"
            echo "" >> "$BODY_FILE"
            grep -E '^(\||###|$)' "${dir}bench-output.txt" >> "$BODY_FILE"
            echo "" >> "$BODY_FILE"
          done
          echo "> Auto-generated by CI on $(date -u +'%Y-%m-%d %H:%M UTC')" >> "$BODY_FILE"
          echo "body_file=${BODY_FILE}" >> "$GITHUB_OUTPUT"

      - name: Find existing comment
        id: find
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## Benchmark Results (CI)'

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: ${{ steps.body.outputs.body_file }}
          edit-mode: replace
