name: Integration & E2E

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'packages/**'
      - 'tests/**'
      - '.github/workflows/integration.yml'
      - '.github/actions/setup-zntc/**'
      - '.github/actions/use-zntc-artifact/**'
      - '.github/actions/bun-cache/**'
  pull_request:
    branches: [main]
    # draft PR 동안 무거운 잡 skip(아래 prepare-* 의 if). draft→ready 전환 시 다시 돌도록
    # ready_for_review 를 트리거 타입에 추가 — 기본 types(opened/synchronize/reopened)엔
    # 없어 누락 시 ready 후 CI 가 발화하지 않는다.
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/**'
      - 'packages/**'
      - 'tests/**'
      - '.github/workflows/integration.yml'
      - '.github/actions/setup-zntc/**'
      - '.github/actions/use-zntc-artifact/**'
      - '.github/actions/bun-cache/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # 잡별 변경 영역 감지 — 파이프라인 일부만 바뀐 PR 에서 무관한 무거운 잡
  # (hermes/e2e/compat-table/determinism)을 skip. 트랜스파일러는 파이프라인이라
  # codegen 등 코어가 바뀌면 거의 모든 잡에 영향 → core 앵커를 보수적으로 넓게 잡아
  # 무손실 유지(영향 가능성 있으면 무조건 포함; 과포함은 비용만 늘 뿐 커버리지 손실 없음).
  # 추가 안전망: integration-ubuntu/macos 는 always-on 이라 cross-surface 회귀 백스톱.
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      compat: ${{ steps.filter.outputs.compat }}
      determinism: ${{ steps.filter.outputs.determinism }}
      e2e: ${{ steps.filter.outputs.e2e }}
      hermes: ${{ steps.filter.outputs.hermes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core: &core
              - 'src/lexer/**'
              - 'src/parser/**'
              - 'src/semantic/**'
              - 'src/transformer/**'
              - 'src/codegen/**'
              - 'src/regexp/**'
              - 'src/transpile/**'
              - 'src/util/**'
              - 'src/cli/**'
              - 'src/*.zig'
              - 'build.zig'
              - 'build.zig.zon'
              - 'tests/**'
              - '.github/workflows/integration.yml'
              - '.github/actions/**'
            compat:
              - *core
            determinism:
              - *core
              - 'src/bundler/**'
            e2e:
              - *core
              - 'src/bundler/**'
              - 'src/app/**'
              - 'src/server/**'
              - 'packages/web/**'
              - 'packages/server/**'
            hermes:
              - *core
              - 'src/bundler/**'
              - 'packages/react-native/**'

  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - uses: ./.github/actions/bun-cache

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (oxlint)
        run: bun run lint

      - name: Format check (oxfmt)
        run: bun run fmt:check

  prepare-zntc-ubuntu:
    name: Prepare ZNTC (ubuntu-latest)
    runs-on: ubuntu-latest
    # draft PR 동안 skip — 이 prepare 가 skip 되면 의존 잡(integration-ubuntu/e2e)도
    # cascade skip. push(main) 에선 항상 실행.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-zntc
        with:
          cpu: baseline
          install: "false"
          cache-key: zntc-ubuntu-baseline

      - name: Upload ZNTC build artifact
        uses: actions/upload-artifact@v4
        with:
          name: zntc-build-ubuntu-latest
          if-no-files-found: error
          retention-days: 1
          path: |
            zig-out/bin/zntc
            zig-out/lib/zntc.node
            packages/core/dist/**

  prepare-zntc-cli-ubuntu:
    name: Prepare ZNTC CLI (ubuntu-latest)
    runs-on: ubuntu-latest
    # draft PR 동안 skip — 의존 잡(smoke/compat-table/determinism)도 cascade skip.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-zntc
        with:
          cpu: baseline
          napi: "false"
          install: "false"
          cache-key: zntc-cli-baseline

      - name: Upload ZNTC CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: zntc-cli-ubuntu-latest
          if-no-files-found: error
          retention-days: 1
          path: zig-out/bin/zntc

  prepare-zntc-macos:
    name: Prepare ZNTC (macos-latest)
    runs-on: macos-latest
    # draft PR 동안 skip — 의존 잡(integration-macos/hermes)도 cascade skip.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-zntc
        with:
          install: "false"
          cache-key: zntc-macos

      - name: Upload ZNTC build artifact
        uses: actions/upload-artifact@v4
        with:
          name: zntc-build-macos-latest
          if-no-files-found: error
          retention-days: 1
          path: |
            zig-out/bin/zntc
            zig-out/lib/zntc.node
            packages/core/dist/**

  integration-ubuntu:
    name: Integration Tests (ubuntu-latest)
    runs-on: ubuntu-latest
    needs: prepare-zntc-ubuntu

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/use-zntc-artifact
        with:
          artifact-name: zntc-build-ubuntu-latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # 통합 테스트 fixture 가 spawn 한 `zntc build` / `zntc dev` (app 모드) 가
      # `@zntc/web` 과 `@zntc/server` 를 lazy import. ZNTC artifact 는 core
      # build:js 까지만 — web/server 와 core dts 를 별도 빌드. (#2539 PR #6d 이후
      # web 의 tsc emit 가 core 의 `prepareAppDevSync` declaration 의존.)
      - name: Build @zntc/core dts + @zntc/server + @zntc/web (app 모드 의존)
        run: |
          bun run --cwd packages/core build:dts
          bun run --cwd packages/server build
          bun run --cwd packages/web build

      # emotion-v10 fixture 는 root workspace 미포함 — 격리 install 필요.
      - name: Install emotion v10 fixture deps
        run: cd tests/integration/fixtures/emotion-v10 && bun install --frozen-lockfile

      - name: Run integration tests
        run: bun run test:integration

  integration-macos:
    name: Integration Tests (macos-latest)
    runs-on: macos-latest
    needs: prepare-zntc-macos

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/use-zntc-artifact
        with:
          artifact-name: zntc-build-macos-latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # 통합 테스트 fixture 가 spawn 한 `zntc build` / `zntc dev` (app 모드) 가
      # `@zntc/web` 과 `@zntc/server` 를 lazy import. ZNTC artifact 는 core
      # build:js 까지만 — web/server 와 core dts 를 별도 빌드. (#2539 PR #6d 이후
      # web 의 tsc emit 가 core 의 `prepareAppDevSync` declaration 의존.)
      - name: Build @zntc/core dts + @zntc/server + @zntc/web (app 모드 의존)
        run: |
          bun run --cwd packages/core build:dts
          bun run --cwd packages/server build
          bun run --cwd packages/web build

      # emotion-v10 fixture 는 root workspace 미포함 — 격리 install 필요.
      - name: Install emotion v10 fixture deps
        run: cd tests/integration/fixtures/emotion-v10 && bun install --frozen-lockfile

      - name: Run integration tests
        run: bun run test:integration

  hermes:
    name: Hermes Validation (RN Bundle)
    runs-on: macos-latest
    needs: [prepare-zntc-macos, changes]
    # RN 패키지 또는 코어 transpile/bundle 경로가 바뀔 때만. web/server/dev 전용 변경엔
    # skip(draft skip 은 prepare-zntc-macos cascade). 코어 회귀는 always-on integration 이 백스톱.
    if: needs.changes.outputs.hermes == 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/use-zntc-artifact
        with:
          artifact-name: zntc-build-macos-latest

      - name: Install RN example app dependencies
        run: cd tests/integration/tests/fixtures/rn-example-app && bun install --frozen-lockfile

      - name: Install hermes-engine-cli (runtime)
        run: npm install -g hermes-engine-cli

      - name: Run Hermes validation (hermesc + runtime)
        run: cd tests/integration && bun test tests/hermes-runtime.test.ts

  compat-table:
    name: compat-table ES Downlevel
    runs-on: ubuntu-latest
    needs: [prepare-zntc-cli-ubuntu, changes]
    # ES 다운레벨은 코어 transpile 경로(parser/transformer/codegen 등)만 의존 —
    # bundler/dev-server/RN/web 전용 변경엔 skip.
    if: needs.changes.outputs.compat == 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/use-zntc-artifact
        with:
          artifact-name: zntc-cli-ubuntu-latest
          napi: "false"

      - name: Install compat-table
        run: cd tests/integration && bun install --frozen-lockfile

      - name: Extract compat-table tests
        run: cd tests/integration && node tests/compat-table-extract.cjs > tests/fixtures/compat-table-tests.json

      - name: Run compat-table tests
        run: cd tests/integration && bun test tests/compat-table.test.ts --timeout 600000

      - name: Upload compat-table report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compat-table-report
          path: tests/integration/compat-table-report.json

      - name: Run SWC comparison tests
        run: cd tests/integration && bun test tests/swc-compare.test.ts --timeout 600000

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [prepare-zntc-ubuntu, changes]
    # 브라우저 dev server 경로 — 코어 + bundler + dev server(src/app,server) + web 패키지
    # 변경 시. RN/Flow 전용 변경엔 skip.
    if: needs.changes.outputs.e2e == 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/use-zntc-artifact
        with:
          artifact-name: zntc-build-ubuntu-latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # E2E test fixture 가 spawn 한 `zntc build` (app 모드) 가 `@zntc/web` 을
      # lazy import. ZNTC artifact 는 core build:js 까지만 — web/server 와 core
      # dts 를 별도 빌드 (#2539 PR #6d 후 web 의 tsc emit 가 core 의
      # `prepareAppDevSync` declaration 의존).
      - name: Build @zntc/core dts + @zntc/server + @zntc/web (E2E app 모드 의존)
        run: |
          bun run --cwd packages/core build:dts
          bun run --cwd packages/server build
          bun run --cwd packages/web build

      - name: Install Playwright browsers
        run: bun run playwright:install

      - name: Run E2E tests
        run: bun run test:e2e

  smoke:
    name: Smoke Tests (Real Projects)
    runs-on: ubuntu-latest
    needs: prepare-zntc-cli-ubuntu

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/use-zntc-artifact
        with:
          artifact-name: zntc-cli-ubuntu-latest
          napi: "false"

      - name: Install smoke dependencies
        run: cd tests/benchmark && bun install --frozen-lockfile

      - name: Run smoke tests
        run: bun run tests/benchmark/smoke.ts 2>&1 | tee smoke-output.txt

      - name: Run smoke tests (--deep --minify-all)
        # 30개 deepEntry fixture 를 minify 강제로 빌드+실행. minify codegen / mangler 회귀
        # (chalk 공백, mangler shadow, dead else, arrow obj body, new callee paren,
        # destructuring shorthand 등) 의 보호 — 이번 라운드에서 12개 PR 머지.
        run: |
          bun run tests/benchmark/smoke.ts --deep --minify-all \
            --filter=react,react-dom,vue,svelte,solid-js,preact,toolkit,mobx,zustand,jotai,immer,valtio,rxjs,tanstack-query,effect,lodash-es,date-fns,zod,dayjs,yaml,axios,express,hono,graphql,supabase,chalk,commander,yargs,three,d3 \
            2>&1 | tee smoke-deep-min-output.txt

      - name: Upload smoke results
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: |
            smoke-output.txt
            smoke-deep-min-output.txt

  determinism:
    name: Build Determinism (N=10) (#3564)
    runs-on: ubuntu-latest
    needs: [prepare-zntc-cli-ubuntu, changes]
    # 번들 byte-identity — 코어 + bundler 변경 시. dev-server/RN/web/napi 전용 변경엔 skip.
    if: needs.changes.outputs.determinism == 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/use-zntc-artifact
        with:
          artifact-name: zntc-cli-ubuntu-latest
          napi: "false"

      - name: Install integration dependencies
        run: cd tests/integration && bun install --frozen-lockfile

      - name: Run determinism gate (N=10 byte-identical)
        run: cd tests/integration && bun test tests/determinism.test.ts --timeout 120000

  smoke-comment:
    name: Post Smoke Results
    needs: smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      pull-requests: write

    steps:
      - name: Download smoke results
        uses: actions/download-artifact@v4
        with:
          name: smoke-results
          path: .

      - name: Build comment body
        id: body
        shell: bash
        run: |
          BODY_FILE=$(mktemp)
          echo "## Smoke Test Results (CI)" >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo "### Surface entry (existing)" >> "$BODY_FILE"
          grep -E '^(\||###|$)' smoke-output.txt >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          SUMMARY=$(tail -1 smoke-output.txt)
          echo "**${SUMMARY}**" >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo "### Deep entry + --minify-all (회귀 보호)" >> "$BODY_FILE"
          grep -E '^(\||###|$)' smoke-deep-min-output.txt >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          DEEP_SUMMARY=$(tail -1 smoke-deep-min-output.txt)
          echo "**${DEEP_SUMMARY}**" >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo "> Auto-generated by CI on $(date -u +'%Y-%m-%d %H:%M UTC')" >> "$BODY_FILE"
          echo "body_file=${BODY_FILE}" >> "$GITHUB_OUTPUT"

      - name: Find existing comment
        id: find
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## Smoke Test Results (CI)'

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: ${{ steps.body.outputs.body_file }}
          edit-mode: replace
