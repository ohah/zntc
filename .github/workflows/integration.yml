name: Integration & E2E

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'packages/**'
      - 'tests/**'
      - '.github/workflows/integration.yml'
      - '.github/actions/setup-zntc/**'
      - '.github/actions/use-zntc-artifact/**'
      - '.github/actions/bun-cache/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'packages/**'
      - 'tests/**'
      - '.github/workflows/integration.yml'
      - '.github/actions/setup-zntc/**'
      - '.github/actions/use-zntc-artifact/**'
      - '.github/actions/bun-cache/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - uses: ./.github/actions/bun-cache

      - name: Install dependencies
        run: bun install

      - name: Lint (oxlint)
        run: bun run lint

      - name: Format check (oxfmt)
        run: bun run fmt:check

  prepare-zntc-ubuntu:
    name: Prepare ZNTC (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-zntc
        with:
          cpu: baseline
          install: "false"

      - name: Upload ZNTC build artifact
        uses: actions/upload-artifact@v4
        with:
          name: zntc-build-ubuntu-latest
          if-no-files-found: error
          retention-days: 1
          path: |
            zig-out/bin/zntc
            zig-out/lib/zntc.node
            packages/core/dist/**

  prepare-zntc-cli-ubuntu:
    name: Prepare ZNTC CLI (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-zntc
        with:
          cpu: baseline
          napi: "false"
          install: "false"

      - name: Upload ZNTC CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: zntc-cli-ubuntu-latest
          if-no-files-found: error
          retention-days: 1
          path: zig-out/bin/zntc

  prepare-zntc-macos:
    name: Prepare ZNTC (macos-latest)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-zntc
        with:
          install: "false"

      - name: Upload ZNTC build artifact
        uses: actions/upload-artifact@v4
        with:
          name: zntc-build-macos-latest
          if-no-files-found: error
          retention-days: 1
          path: |
            zig-out/bin/zntc
            zig-out/lib/zntc.node
            packages/core/dist/**

  integration-ubuntu:
    name: Integration Tests (ubuntu-latest)
    runs-on: ubuntu-latest
    needs: prepare-zntc-ubuntu

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/use-zntc-artifact
        with:
          artifact-name: zntc-build-ubuntu-latest

      - name: Install dependencies
        run: bun install

      - name: Run integration tests
        run: bun run test:integration

  integration-macos:
    name: Integration Tests (macos-latest)
    runs-on: macos-latest
    needs: prepare-zntc-macos

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/use-zntc-artifact
        with:
          artifact-name: zntc-build-macos-latest

      - name: Install dependencies
        run: bun install

      - name: Run integration tests
        run: bun run test:integration

  hermes:
    name: Hermes Validation (RN Bundle)
    runs-on: macos-latest
    needs: prepare-zntc-macos

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/use-zntc-artifact
        with:
          artifact-name: zntc-build-macos-latest

      - name: Install RN example app dependencies
        run: cd tests/integration/tests/fixtures/rn-example-app && bun install

      - name: Install hermes-engine-cli (runtime)
        run: npm install -g hermes-engine-cli

      - name: Run Hermes validation (hermesc + runtime)
        run: cd tests/integration && bun test tests/hermes-runtime.test.ts

  compat-table:
    name: compat-table ES Downlevel
    runs-on: ubuntu-latest
    needs: prepare-zntc-cli-ubuntu

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/use-zntc-artifact
        with:
          artifact-name: zntc-cli-ubuntu-latest
          napi: "false"

      - name: Install compat-table
        run: cd tests/integration && bun install

      - name: Extract compat-table tests
        run: cd tests/integration && node tests/compat-table-extract.cjs > tests/fixtures/compat-table-tests.json

      - name: Run compat-table tests
        run: cd tests/integration && bun test tests/compat-table.test.ts --timeout 600000

      - name: Upload compat-table report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compat-table-report
          path: tests/integration/compat-table-report.json

      - name: Run SWC comparison tests
        run: cd tests/integration && bun test tests/swc-compare.test.ts --timeout 600000

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: prepare-zntc-ubuntu

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/use-zntc-artifact
        with:
          artifact-name: zntc-build-ubuntu-latest

      - name: Install dependencies
        run: bun install

      # E2E test fixture 가 spawn 한 `zntc build` (app 모드) 가 `@zntc/web` 을
      # lazy import. ZNTC artifact 는 core build:js 까지만 — web/server 와 core
      # dts 를 별도 빌드 (#2539 PR #6d 후 web 의 tsc emit 가 core 의
      # `prepareAppDevSync` declaration 의존).
      - name: Build @zntc/core dts + @zntc/server + @zntc/web (E2E app 모드 의존)
        run: |
          bun run --cwd packages/core build:dts
          bun run --cwd packages/server build
          bun run --cwd packages/web build

      - name: Install Playwright browsers
        run: bun run playwright:install

      - name: Run E2E tests
        run: bun run test:e2e

  smoke:
    name: Smoke Tests (Real Projects)
    runs-on: ubuntu-latest
    needs: prepare-zntc-cli-ubuntu

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/use-zntc-artifact
        with:
          artifact-name: zntc-cli-ubuntu-latest
          napi: "false"

      - name: Install smoke dependencies
        run: cd tests/benchmark && bun install

      - name: Run smoke tests
        run: bun run tests/benchmark/smoke.ts 2>&1 | tee smoke-output.txt

      - name: Upload smoke results
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: smoke-output.txt

  smoke-comment:
    name: Post Smoke Results
    needs: smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      pull-requests: write

    steps:
      - name: Download smoke results
        uses: actions/download-artifact@v4
        with:
          name: smoke-results

      - name: Build comment body
        id: body
        shell: bash
        run: |
          BODY_FILE=$(mktemp)
          echo "## Smoke Test Results (CI)" >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          grep -E '^(\||###|$)' smoke-output.txt >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          # 통과/실패 요약
          SUMMARY=$(tail -1 smoke-output.txt)
          echo "**${SUMMARY}**" >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo "> Auto-generated by CI on $(date -u +'%Y-%m-%d %H:%M UTC')" >> "$BODY_FILE"
          echo "body_file=${BODY_FILE}" >> "$GITHUB_OUTPUT"

      - name: Find existing comment
        id: find
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '## Smoke Test Results (CI)'

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: ${{ steps.body.outputs.body_file }}
          edit-mode: replace
