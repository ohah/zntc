name: NAPI Leak Gate (disabled until Zig 0.16)

# dev/watch RSS 누수 회귀 가드 (PR #3691~#3713 epic 후속).
# Debug GPA leak detector (`packages/core/src/napi/common.zig` 의 debug_gpa) 가
# 1분 dev probe 후 process 종료 시 stack trace 포함 leak 리포트 dump. 회귀
# 발생 시 leak entries > 0 또는 panic 으로 즉시 차단.
#
# **현재 비활성화** — Zig 0.15.2 + Linux x86_64 + libc shared library 의
# DebugAllocator `captureStackTrace` 가 frame pointer chain unwinding 시 SEGV
# (Zig issue #25025). 0.16.0 milestone 에서 fix 됐으나 ZTS 는 0.15.2 사용.
# Zig 0.16 업그레이드 epic (issue #1514) 머지 후 다시 활성화 — 그 때 아래
# `on:` 트리거 (`push.branches`, `schedule.cron`) 의 주석을 제거.
#
# **macOS local 측정은 정상 동작** — `docs/DEBUG.md` / Starlight guide 의
# 1분 dev probe 스크립트로 직접 사용 가능. 회귀 의심 시 macOS 에서 수동 측정.
#
# **임시 측정 인프라**: Debug NAPI 빌드 한정. ReleaseFast (production) 영향 0.
# 기대값: leak entries=0, panics=0, rebuilt≥5 (touch-probe 정상 작동 검증).

on:
  # push / schedule 비활성. workflow_dispatch 만 유지 — Zig 0.16 후 수동 검증.
  # push:
  #   branches: [main]
  #   paths:
  #     - "packages/core/src/napi/**"
  #     - "src/bundler/**"
  #     - "src/parser/**"
  #     - "src/transformer/**"
  #     - "src/codegen/**"
  #     - "src/transpile.zig"
  #     - "examples/web/**"
  #     - ".github/workflows/napi-leak-gate.yml"
  workflow_dispatch:
  # schedule:
  #   - cron: "0 4 * * *"

concurrency:
  group: napi-leak-gate-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  measure:
    name: dev probe leak entries == 0
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: ./.github/actions/checkout-zntc

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          cache-key: napi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: ./.github/actions/bun-cache

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build NAPI (Debug — leak detector 활성)
        # `-Dnapi-optimize=Debug` 는 build.zig:233 의 napi_optimize option.
        # default ReleaseFast 라 명시적 Debug 필수.
        run: zig build napi --cache-dir .zig-cache-napi -Dnapi-optimize=Debug

      - name: Verify Debug NAPI build artifact (fail-fast)
        # `|| true` 로 cp 실패를 마스킹하면 stale binary 로 진행 → 진단 불가.
        # Debug NAPI 산출물 부재 시 즉시 fail-fast 로 환경 차이 즉시 노출.
        run: |
          ls -la zig-out/lib/
          test -f zig-out/lib/zntc.node || { echo "::error::Debug NAPI build did not produce zig-out/lib/zntc.node"; exit 1; }
          file zig-out/lib/zntc.node || true
          ls -la zig-out/lib/zntc.node

      - name: Copy .node to package (BEFORE build:js — Debug NAPI self-host)
        # build:js:cjs 가 zntc self-host 로 bundle (`node bin/zntc.mjs --bundle`).
        # `packages/core/index.ts:findAddon()` 이 `zig-out/lib/zntc.node` 를
        # 최우선 resolve 라 사실 cp 안 해도 self-host 는 zig-out 의 .node 사용.
        # 그래도 packages/core/zntc.node 도 명시 일치시켜 dev probe step 의
        # examples/web 의 `bun run dev` (predev=build:js, zntc dev) 가 동일
        # Debug binary 보장. `|| true` 제거 — cp 실패 시 fail-fast.
        run: cp zig-out/lib/zntc.node packages/core/zntc.node

      - name: NAPI smoke test (self-host Debug build 부팅 검증)
        # 본격 build:js 전에 Debug NAPI 가 정상 dlopen + symbol resolve 되는지
        # smoke. 이전 run #26336685916 통과 → dlopen + init 정상.
        run: |
          node -e "
            const addon = require('./packages/core/zntc.node');
            console.log('NAPI keys:', Object.keys(addon).slice(0, 5).join(','), '...');
            console.log('NAPI smoke: dlopen + symbol resolve OK');
          "

      - name: NAPI configureProfile smoke (NAPI string getter path 검증)
        # `configureProfile(['none'])` — non-empty 1-element 로 `parseStringArray`
        # + `napi_get_value_string_utf8` (review max F5) 까지 cover.
        # empty `[]` 면 fast path 라 string getter 미실행 → SIGSEGV isolation 약함.
        # stderr 캡쳐 (review max F6) — failure 시 root cause 분석 가능.
        run: |
          mkdir -p /tmp/leak-probe
          node -e "
            const addon = require('./packages/core/zntc.node');
            addon.configureProfile(['none']);
            console.log('configureProfile OK');
          " 2> /tmp/leak-probe/configureProfile.stderr.log
          rc=$?
          if [ $rc -eq 139 ]; then echo "::error::configureProfile SIGSEGV (139)"; cat /tmp/leak-probe/configureProfile.stderr.log; exit 1
          elif [ $rc -ne 0 ]; then echo "::error::configureProfile non-zero exit ($rc)"; cat /tmp/leak-probe/configureProfile.stderr.log; exit 1
          fi
          echo "configureProfile smoke: OK"

      - name: NAPI transpile smoke (full transpile path — Scanner + transformer + emitter)
        # `transpile(source, filename)` 는 NAPI 진입점 중 가장 무겁다 (Scanner
        # + parser + transformer + emitter chain). tokenize 보다 더 많은 NAPI
        # path 거침. tokenize SIGSEGV (이전 run #26337129125) 가 Scanner-only
        # 인지 더 깊은 path 인지 분기. exit code 139 (SIGSEGV) 와 다른 throw
        # (exit 1) 구분 (review max F4).
        run: |
          node -e "
            const addon = require('./packages/core/zntc.node');
            const result = addon.transpile('var x = 1;', 'test.js');
            console.log('transpile OK:', typeof result, result && result.code ? 'code.len=' + result.code.length : '');
          " 2> /tmp/leak-probe/transpile.stderr.log
          rc=$?
          if [ $rc -eq 139 ]; then echo "::error::transpile SIGSEGV (139)"; cat /tmp/leak-probe/transpile.stderr.log; exit 1
          elif [ $rc -ne 0 ]; then echo "::error::transpile non-zero exit ($rc) — NAPI throw or assertion"; cat /tmp/leak-probe/transpile.stderr.log; exit 1
          fi
          echo "transpile smoke: OK"

      - name: NAPI atexit smoke (Linux-specific dumpLeaksAtExit 검증)
        # 가장 light path — require + process exit (atexit 발화) 만.
        # SIGSEGV 시 atexit 의 dumpLeaksAtExit/detectLeaks 가 Linux 환경
        # 특이 문제 (DWARF/stderr fd/stack trace) — PR #3713 의 mutex.tryLock
        # + detectLeaks fix 가 Linux glibc 환경에서 다른 동작 가능성.
        run: |
          node -e "
            const addon = require('./packages/core/zntc.node');
            console.log('atexit smoke: require done, exiting...');
          " || { echo "::error::atexit smoke SIGSEGV — dumpLeaksAtExit Linux 문제"; exit 1; }
          echo "atexit smoke: process exit clean"

      - name: NAPI tokenize smoke (NAPI call path 검증)
        # tokenize 는 가장 단순 NAPI call — string in/out, 다른 NAPI helpers
        # (parseBuildOptions 등) 안 거침. SIGSEGV 시 transpile/tokenize 자체
        # NAPI 경로의 latent bug. 통과 시 build:js 의 더 복잡한 옵션 path 문제.
        run: |
          node -e "
            const addon = require('./packages/core/zntc.node');
            const result = addon.tokenize('var x = 1;', 'test.js');
            console.log('tokenize OK:', typeof result, Array.isArray(result) ? 'len=' + result.length : '');
          " || { echo "::error::tokenize smoke SIGSEGV — NAPI tokenize/transpile path 문제"; exit 1; }
          echo "tokenize smoke: NAPI call OK"

      - name: Build JS wrapper + dts
        # 이전 run #26336187926 + #26336685916 모두 이 step 에서 SIGSEGV.
        # 위 atexit/tokenize smoke 가 통과했다면 build:js:cjs 의 `node bin/zntc.mjs
        # --bundle` 의 더 복잡한 NAPI call path (napiBuild/napiBuildSync) 문제.
        run: cd packages/core && bun run build:js && bun run build:dts

      - name: 1-min dev probe (Bun graceful exit)
        run: |
          mkdir -p /tmp/leak-probe
          cd examples/web

          # touch-probe marker (CI fresh checkout 라 항상 없음)
          echo "// touch-probe 0" >> src/App.tsx

          # dev background. Bun 의 SIGTERM handler 가 process.exit() 호출 →
          # atexit 발화. C atexit 은 POSIX SIGTERM default 에선 발화 안 함 —
          # Bun runtime 의 graceful shutdown 에 의존. 실측 PR #3713 검증됨.
          nohup bun run dev > /tmp/leak-probe/stdout.log 2> /tmp/leak-probe/stderr.log &
          DEV_PID=$!
          echo "DEV_PID=$DEV_PID"

          # Ready signal polling — sleep fixed 대신 dev server 출력으로 판단.
          # ZNTC 의 `[serve] http://localhost:NNNN` 또는 `bundled` 메시지를 기다림.
          # timeout 30s 후 강제 진행 (warmup floor).
          ready=0
          for i in $(seq 1 60); do
            if grep -qE "\[serve\]|listening|bundled.*modules" /tmp/leak-probe/stdout.log /tmp/leak-probe/stderr.log 2>/dev/null; then
              ready=1
              echo "Dev server ready after ~${i}*0.5s"
              break
            fi
            sleep 0.5
          done
          if [ "$ready" != "1" ]; then
            echo "::warning::dev server ready signal not found within 30s — proceeding anyway"
          fi
          # 추가 buffer (watcher arm 시간)
          sleep 2

          # 3s 간격 touch × 20회 = 1분. `sed -i` (GNU, no .bak) — watcher 가
          # .bak 도 트리거 가능성 차단 (review max F8).
          for i in $(seq 1 20); do
            sed -i "s|// touch-probe .*|// touch-probe $i|" src/App.tsx
            sleep 3
          done

          # SIGTERM → Bun graceful shutdown → atexit → leak dump.
          # wait-with-timeout pattern (review max F4): SIGKILL 은 fallback 만.
          kill -TERM $DEV_PID 2>/dev/null || true
          for i in $(seq 1 20); do
            if ! kill -0 $DEV_PID 2>/dev/null; then
              echo "Dev process exited gracefully after ~${i}s"
              break
            fi
            sleep 1
          done
          # 만약 graceful 안 되면 SIGKILL (dump 손실 가능 → leak count 부정확)
          if kill -0 $DEV_PID 2>/dev/null; then
            echo "::warning::dev process did not exit within 20s after SIGTERM — forcing SIGKILL (leak dump may be truncated)"
            kill -KILL $DEV_PID 2>/dev/null || true
          fi
          wait $DEV_PID 2>/dev/null || true

      - name: Assert leak entries == 0
        run: |
          # `grep -c` no-match 시 exit 1 + "0" 출력 — `|| echo 0` 만 쓰면
          # capture 가 "0\n0" 2 줄이 됨 (review max F2/F3 CRITICAL catch).
          # 별도 line 으로 분리 + `|| true` 로 exit code 무시.
          set +e
          LEAK=$(grep -c "error(gpa): memory address" /tmp/leak-probe/stderr.log 2>/dev/null)
          [ -z "$LEAK" ] && LEAK=0
          PANIC=$(grep -ciE "^thread [0-9]+ panic:|^panic:|^Segmentation fault|^Bus error|^Aborted|invalid free|allocator mismatch" /tmp/leak-probe/stderr.log 2>/dev/null)
          [ -z "$PANIC" ] && PANIC=0
          REBUILT=$(grep -cE "\[serve\] rebuilt|\[watch\] rebuilt" /tmp/leak-probe/stderr.log 2>/dev/null)
          [ -z "$REBUILT" ] && REBUILT=0
          set -e

          echo "=== NAPI Leak Gate Result ==="
          echo "leak entries: $LEAK"
          echo "panics:       $PANIC"
          echo "rebuilt:      $REBUILT"
          echo ""
          echo "=== Top leak stack frames (if any) ==="
          # DebugAllocator stack trace 줄 형식: `<spaces>0x<addr> in <name> (<file>)`
          # review max F9 의 grep pattern fix.
          grep -E "^\s+0x[0-9a-f]+ in " /tmp/leak-probe/stderr.log 2>/dev/null | sort | uniq -c | sort -rn | head -20 || echo "(no stack frames matched)"

          # Assertion
          FAIL=0
          if [ "$LEAK" != "0" ]; then
            echo "::error::Leak regression: $LEAK entries detected. Check docs/DEBUG.md 의 'NAPI 누수 측정' 섹션 + 위 stack frame 분포."
            FAIL=1
          fi
          if [ "$PANIC" != "0" ]; then
            echo "::error::Panic/abort detected: $PANIC. Check stderr.log 의 panic message + stack trace."
            FAIL=1
          fi
          if [ "$REBUILT" -lt 5 ]; then
            echo "::error::Watch trigger insufficient: rebuilt=$REBUILT (expected >=5). dev server / watcher 회귀 가능성."
            FAIL=1
          fi

          if [ "$FAIL" != "0" ]; then
            echo ""
            echo "=== Full stderr (last 200 lines) ==="
            tail -200 /tmp/leak-probe/stderr.log 2>/dev/null || echo "(stderr.log unavailable)"
            exit 1
          fi

          echo ""
          echo "✅ NAPI leak gate PASS"

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: leak-probe-logs
          path: |
            /tmp/leak-probe/stderr.log
            /tmp/leak-probe/stdout.log
          retention-days: 7
