name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      # Deploy Pages only when the docs site itself changes. Core/source changes
      # still run CI, but they should not publish docs unless docs files changed.
      - "documents/**"
      - ".github/workflows/docs.yml"
      - ".github/actions/bun-cache/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  # GitHub Pages 공식 권장 — 새 push 가 들어와도 진행 중인 deploy 는 끝까지 보장.
  # cancel-in-progress: true 는 빠른 연속 commit 시 모든 deploy 가 취소되어 어떤 commit
  # 도 publish 되지 못하는 패턴을 만든다.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          # ci.yml 의 wasm job 과 동일 빌드 프로파일 — 키 공유로 cross-workflow 재사용.
          cache-key: wasm

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - uses: ./.github/actions/bun-cache

      - name: Build WASM (transpile + bundler)
        run: zig build wasm wasm-bundler

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # documents/package.json 의 prebuild 가 zig-out/bin/zntc.wasm + zntc-bundler.wasm 을
      # public/ 으로 복사 — playground (transpile) + playground/bundler 둘 다 동작.
      - name: Build docs
        run: cd documents && bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: documents/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
