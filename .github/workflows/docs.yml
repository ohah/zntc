name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "documents/**"
      - "packages/core/**"
      - "packages/wasm/**"
      - "src/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  # GitHub Pages 공식 권장 — 새 push 가 들어와도 진행 중인 deploy 는 끝까지 보장.
  # cancel-in-progress: true 는 빠른 연속 commit 시 모든 deploy 가 취소되어 어떤 commit
  # 도 publish 되지 못하는 패턴을 만든다.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build WASM (transpile + bundler)
        run: zig build wasm wasm-bundler

      - name: Install dependencies
        run: bun install

      # documents/package.json 의 prebuild 가 zig-out/bin/zts.wasm + zts-bundler.wasm 을
      # public/ 으로 복사 — playground (transpile) + playground/bundler 둘 다 동작.
      - name: Build docs
        run: cd documents && bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: documents/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
