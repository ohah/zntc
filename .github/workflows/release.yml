name: Release

on:
  push:
    tags:
      - 'v*'
  # 빌드 설정(release.yml/build.zig)을 바꾸는 PR 은 9-플랫폼 NAPI/CLI 빌드만 돌려
  # cross-build 회귀를 tag push 전에 잡는다. publish/release 는 push 이벤트 전용이라 skip.
  pull_request:
    paths:
      - '.github/workflows/release.yml'
      - 'build.zig'
      - 'build.zig.zon'
  # default branch 에 이 트리거가 있어야 수동 실행 가능 (머지 후 임의 검증용).
  workflow_dispatch:

# permissions:
#   contents: write   — github-release job (CLI binary tarball 업로드)
#   id-token: write   — publish-npm job (npm OIDC trusted publishing 준비)
# 첫 publish 는 NPM_TOKEN 으로. trusted publisher 등록 + NPM_TOKEN 삭제 후엔
# OIDC 만으로 동작 (--provenance 자동 부착).
permissions:
  contents: write
  id-token: write

jobs:
  # ─── NAPI 바이너리 매트릭스 빌드 ───
  # PLATFORMS in packages/core/src/platforms.ts 와 sync (YAML 정적 한계). 9 platform
  # 각각 native runner 에서 zig build napi → zntc.node artifact.
  build-napi:
    name: Build NAPI (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      # 9 platform 중 windows-11-arm 같은 preview runner 가 일시 flaky 일 때
      # 다른 8 개 빌드까지 abort → 전체 재실행 비용. 하나 실패해도 나머지는
      # 완주시켜 부분 publish/디버그 가능하도록.
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64-gnu
            runner: ubuntu-latest
            zig_target: x86_64-linux-gnu
          - platform: linux-arm64-gnu
            runner: ubuntu-24.04-arm
            zig_target: aarch64-linux-gnu
          - platform: linux-x64-musl
            runner: ubuntu-latest
            zig_target: x86_64-linux-musl
          - platform: linux-arm64-musl
            runner: ubuntu-24.04-arm
            zig_target: aarch64-linux-musl
          - platform: darwin-x64
            runner: macos-15-intel
            zig_target: x86_64-macos
          - platform: darwin-arm64
            runner: macos-latest
            zig_target: aarch64-macos
          - platform: win32-x64-msvc
            runner: windows-latest
            zig_target: x86_64-windows-msvc
          # aarch64-windows-msvc: Zig 0.16.0 의 arm64-windows 컴파일러 *바이너리* 가
          # windows-11-arm 네이티브 러너에서 segfault (upstream — 0.15.2 는 정상).
          # 타겟 코드젠 자체는 정상이라 x64 호스트에서 cross-compile 하면 회피된다
          # (byte-identical 산출물). windows-latest(x64) 에서 -Dtarget 으로 빌드.
          - platform: win32-arm64-msvc
            runner: windows-latest
            zig_target: aarch64-windows-msvc
          - platform: win32-ia32-msvc
            runner: windows-latest
            zig_target: x86-windows-msvc

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          cache-key: napi-${{ matrix.zig_target }}

      - name: Build NAPI (ReleaseFast)
        shell: bash
        run: zig build napi --cache-dir .zig-cache-napi -Doptimize=ReleaseFast -Dtarget=${{ matrix.zig_target }}

      - name: Locate zntc.node
        id: locate
        shell: bash
        run: |
          if [ -f "zig-out/lib/zntc.node" ]; then
            echo "path=zig-out/lib/zntc.node" >> "$GITHUB_OUTPUT"
          elif [ -f "zig-out/bin/zntc.node" ]; then
            echo "path=zig-out/bin/zntc.node" >> "$GITHUB_OUTPUT"
          else
            echo "::error::zntc.node not found after zig build napi"
            exit 1
          fi

      - name: Upload zntc.node artifact
        uses: actions/upload-artifact@v4
        with:
          name: zntc-node-${{ matrix.platform }}
          if-no-files-found: error
          retention-days: 1
          path: ${{ steps.locate.outputs.path }}

  # ─── CLI 바이너리 매트릭스 (GitHub Release tarball) ───
  # NAPI 매트릭스와 동일한 9 platform — standalone CLI 사용자도 동일 커버리지.
  build-cli:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux-gnu
            os: ubuntu-latest
            artifact: zntc-x86_64-linux-gnu
          - target: aarch64-linux-gnu
            os: ubuntu-24.04-arm
            artifact: zntc-aarch64-linux-gnu
          - target: x86_64-linux-musl
            os: ubuntu-latest
            artifact: zntc-x86_64-linux-musl
          - target: aarch64-linux-musl
            os: ubuntu-24.04-arm
            artifact: zntc-aarch64-linux-musl
          - target: x86_64-macos
            os: macos-15-intel
            artifact: zntc-x86_64-macos
          - target: aarch64-macos
            os: macos-latest
            artifact: zntc-aarch64-macos
          - target: x86_64-windows-msvc
            os: windows-latest
            artifact: zntc-x86_64-windows
          # aarch64-windows-msvc: arm64-windows zig 바이너리가 windows-11-arm 에서
          # segfault (upstream Zig 0.16.0). 타겟 코드젠은 정상 → windows-latest(x64)
          # 에서 -Dtarget cross-compile 로 회피.
          - target: aarch64-windows-msvc
            os: windows-latest
            artifact: zntc-aarch64-windows
          - target: x86-windows-msvc
            os: windows-latest
            artifact: zntc-x86-windows

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          cache-key: cli-${{ matrix.target }}

      # mimalloc(prim.c)이 macOS 에서 <CommonCrypto/CommonCryptoError.h> 를 include 하는데,
      # -Dtarget 명시 시 zig 가 cross 모드가 되어 시스템 SDK 헤더 경로를 자동 포함하지 않는다.
      # SDKROOT 를 주면 native runner 의 SDK 헤더를 찾아 해결.
      - name: Setup macOS SDK
        if: runner.os == 'macOS'
        run: echo "SDKROOT=$(xcrun --show-sdk-path)" >> "$GITHUB_ENV"

      - name: Build CLI (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}

      # NOTICE = BoringSSL Apache-2.0 §4(d) attribution. CLI tarball 에도 포함
      # (#2538 4-1 review follow-up).
      - name: Stage NOTICE into CLI artifact dir
        run: cp NOTICE zig-out/bin/NOTICE

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 1
          path: zig-out/bin/

  # ─── npm publish (5 sub-package + main + 나머지) ───
  publish-npm:
    name: Publish to npm
    needs: build-napi
    # tag push 일 때만 실제 publish. workflow_dispatch(수동) 는 빌드 검증 전용.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      # `runs-on` 과 매칭 — 변경 시 함께 갱신. 사용처: "Place zntc.node in main package".
      MAIN_BUILD_NAPI_PLATFORM: linux-x64-gnu

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          # 이 job 은 zig build 를 직접 돌리지 않음 (artifact download) — 전역
          # 기본 키 공유로 인한 thrash 만 격리.
          cache-key: release-publish

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      # registry-url 을 지정하면 setup-node 가 NPM_CONFIG_USERCONFIG 를 $RUNNER_TEMP/.npmrc
      # 로 설정해, 아래 Publish step 이 $HOME/.npmrc 에 쓴 토큰을 npm 이 무시한다.
      # registry-url 생략 → npm 이 기본 $HOME/.npmrc 를 읽게 함.
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: ./.github/actions/bun-cache

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download all NAPI artifacts
        uses: actions/download-artifact@v4
        with:
          path: napi-artifacts/
          pattern: zntc-node-*

      # build-napi 매트릭스의 artifact 디렉토리 자체를 glob — platform 이름 hardcoded
      # 제거 (PLATFORMS 가 늘면 release.yml 매트릭스만 추가하면 자동 픽업).
      - name: Distribute zntc.node + NOTICE into platform sub-packages
        shell: bash
        run: |
          set -euo pipefail
          # NOTICE = BoringSSL Apache-2.0 §4(d) attribution. 각 sub-package files
          # 에 등록돼 있지만 root NOTICE 가 repo 에만 있어 publish 직전 cp 필요
          # (#2538 4-1 review follow-up).
          for dir in napi-artifacts/zntc-node-*/; do
            platform="${dir#napi-artifacts/zntc-node-}"
            platform="${platform%/}"
            src="${dir}zntc.node"
            dst="packages/core-${platform}/zntc.node"
            if [ ! -f "$src" ]; then
              echo "::error::missing artifact: $src"
              exit 1
            fi
            if [ ! -d "packages/core-${platform}" ]; then
              echo "::error::sub-package directory missing: packages/core-${platform}"
              exit 1
            fi
            cp "$src" "$dst"
            cp NOTICE "packages/core-${platform}/NOTICE"
            size=$(stat -c%s "$dst" 2>/dev/null || stat -f%z "$dst")
            echo "✓ ${dst} (${size} bytes) + NOTICE"
          done

      # main `@zntc/core` publish 의 prepublishOnly 가 build:js:cjs 단계에서
      # ZNTC self-host (`node bin/zntc.mjs --bundle ...`) 호출 — packages/core/zntc.node
      # 가 runner 환경에 있어야 동작. publish 산출물 자체에는 안 들어감 (main
      # 패키지의 `files` 필드에 zntc.node 미포함, sub-package 만 ship).
      - name: Place zntc.node in main package (build-time only)
        shell: bash
        run: |
          set -euo pipefail
          src="napi-artifacts/zntc-node-${MAIN_BUILD_NAPI_PLATFORM}/zntc.node"
          if [ ! -f "$src" ]; then
            echo "::error::missing artifact for main package build: $src"
            exit 1
          fi
          cp "$src" packages/core/zntc.node
          size=$(stat -c%s packages/core/zntc.node 2>/dev/null || stat -f%z packages/core/zntc.node)
          echo "✓ packages/core/zntc.node (${size} bytes) — prepublishOnly build"

      # dist-tag 자동 감지: v0.1.0 → latest, v0.1.0-rc.1 → rc, v0.1.0-beta.1 → beta
      - name: Determine npm dist-tag
        id: tag
        shell: bash
        run: |
          REF="${{ github.ref_name }}"
          VERSION="${REF#v}"
          if [[ "$VERSION" == *-* ]]; then
            PREID="${VERSION#*-}"
            DIST_TAG="${PREID%%.*}"
          else
            DIST_TAG="latest"
          fi
          echo "dist-tag=${DIST_TAG}" >> "$GITHUB_OUTPUT"
          echo "Will publish with --tag ${DIST_TAG}"

      # 인증: bun publish 는 각 패키지 cwd(packages/core-*)에서 실행되어 $HOME/.npmrc 를
      # 못 찾고 "missing authentication" 으로 실패한다. NPM_CONFIG_TOKEN 환경변수는 cwd 무관
      # 하게 인식되므로 이걸로 bun publish 를 인증한다(로컬 `bun pm whoami` 로 검증).
      # $HOME/.npmrc + npm whoami 는 16개 publish 전 인증 사전 검증용.
      - name: Publish via release.ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > "$HOME/.npmrc"
          npm whoami
          bun scripts/release.ts --publish --yes --tag "${{ steps.tag.outputs.dist-tag }}"

  # ─── GitHub Release (CLI binary tarball) ───
  github-release:
    name: Create GitHub Release
    needs: [build-cli, publish-npm]
    # tag push 전용 — workflow_dispatch 검증 실행에서는 publish-npm 이 skip 되므로 함께 skip.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: zntc-*-*

      - name: Create tarballs
        run: |
          cd artifacts
          for dir in zntc-*/; do
            name="${dir%/}"
            tar -czf "${name}.tar.gz" -C "$dir" .
          done

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/zntc-*.tar.gz

  # publish 직후 bun.lock 을 main 에 되돌린다.
  #
  # 왜 필요한가: `@zntc/core` 의 optionalDependencies 는 platform 바이너리 9개
  # (`@zntc/core-*`)를 **하드핀 버전**으로 가리키는데, 이 패키지들은 `workspaces` 밖이라
  # bun 이 npm 레지스트리에서 해석한다. 릴리스 시점엔 그 버전이 아직 npm 에 없어서
  # lockfile 에 안 들어가고, **publish 된 뒤에야** 해석 가능해진다. 그 순간부터
  # lockfile 이 stale 이 되어 이후 모든 PR 의 `bun install --frozen-lockfile` 이
  # "lockfile had changes, but lockfile is frozen" 으로 실패한다.
  #
  # v0.1.2 때 이 문제로 수습 커밋 3개가 필요했다. 자동화한다.
  #
  # (platform 패키지를 `workspaces` 에 넣으면 로컬 링크가 되어 근본 해결되지만,
  #  publint / publish-smoke 가 workspaces 를 훑어 publishable 패키지를 세는데
  #  이들은 `dist/` 없는 바이너리 전용이라 그 검증이 통째로 깨진다.)
  sync-lockfile:
    name: Sync bun.lock (post-publish)
    needs: publish-npm
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      # npm 이 방금 publish 된 버전을 색인하는 데 시간이 걸린다 — 아직 안 보이면
      # lockfile 이 그대로라 no-op 이 되고 다음 PR 에서 다시 터진다.
      - name: Wait for npm to index the published version
        run: |
          VERSION="$(node -p "require('./packages/core/package.json').version")"
          echo "waiting for @zntc/core-linux-x64-gnu@${VERSION} on npm…"
          for i in $(seq 1 30); do
            if npm view "@zntc/core-linux-x64-gnu@${VERSION}" version >/dev/null 2>&1; then
              echo "  indexed after ${i} attempt(s)"
              exit 0
            fi
            sleep 10
          done
          echo "::error::@zntc/core-*@${VERSION} 이 5분 안에 npm 에 색인되지 않았다. bun.lock 을 수동으로 동기화해야 한다 (bun install && commit)."
          exit 1

      - name: Resolve newly published platform packages into bun.lock
        run: bun install --no-frozen-lockfile

      - name: Commit if changed
        run: |
          if git diff --quiet bun.lock; then
            echo "bun.lock 변경 없음 — 할 일 없음."
            exit 0
          fi
          VERSION="$(node -p "require('./packages/core/package.json').version")"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "chore: bun.lock post-publish sync — v${VERSION} platform 바이너리 npm refs

          publish 직후 @zntc/core-*@${VERSION} 이 npm 에서 해석 가능해지면서 lockfile 에
          추가된다. 이걸 되돌리지 않으면 이후 모든 PR 의 bun install --frozen-lockfile 이
          실패한다. release.yml 의 sync-lockfile 잡이 자동 생성한 커밋."
          git push origin main
          echo "✓ bun.lock 동기화 커밋 push 완료"
