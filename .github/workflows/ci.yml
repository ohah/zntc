name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build

      - name: Run Tests
        run: zig build test

      - name: Run Test262 Runner Tests
        run: zig build test262

      - name: Build (ReleaseSafe)
        run: zig build -Doptimize=ReleaseSafe

      - name: Build (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast

      - name: Build (ReleaseSmall)
        run: zig build -Doptimize=ReleaseSmall

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Check formatting
        run: zig fmt --check src/

  napi:
    name: NAPI Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install

      - name: Build NAPI module
        run: zig build napi

      - name: Build JS wrapper
        run: cd packages/core && bun build index.ts --outdir dist --format esm --target node

      - name: Copy .node to package
        run: cp zig-out/lib/zts.node packages/core/zts.node 2>/dev/null || true

      - name: Run NAPI tests (Bun)
        run: cd packages/core && bun test index.test.ts

      - name: Run NAPI tests (Node.js)
        run: node --test packages/core/napi.test.mjs

      - name: Run CLI tests (Bun)
        run: cd packages/core && bun test bin/zts.test.ts

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build WASM (ReleaseSmall)
        run: zig build -Dtarget=wasm32-freestanding -Doptimize=ReleaseSmall
        continue-on-error: true  # WASM 타겟은 추후 본격 지원 시 필수로 전환
