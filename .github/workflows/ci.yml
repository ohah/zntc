name: CI

on:
  push:
    branches: [main]
    # 순수 문서 변경은 build/test 에 영향 없음 — 24-job 매트릭스 skip. documents/
    # 사이트는 docs.yml 이 별도 배포. tests/**/*.md fixture 영향을 피하려 docs 위치/
    # 루트 *.md 로 한정(전역 **.md 미사용).
    paths-ignore:
      - 'documents/**'
      - 'docs/**'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'documents/**'
      - 'docs/**'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # PR 에선 무거운 매트릭스(release-build, napi-package-smoke)를 축소하고 push(main)
  # 에선 풀로 돌리기 위해 event 별 matrix JSON 을 방출한다. job-level if 는 matrix
  # 컨텍스트를 못 쓰므로(GHA 제약) 동적 매트릭스 + fromJSON 으로 구현(표준 패턴).
  # 풀 매트릭스는 머지마다 push(main)에서 전수 검증되므로 release 안전(release.yml 불변).
  setup-matrix:
    name: Compute matrices (PR=축소 / push=풀)
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.gen.outputs.release }}
      smoke: ${{ steps.gen.outputs.smoke }}
    steps:
      - id: gen
        shell: bash
        env:
          EVENT: ${{ github.event_name }}
        run: |
          # 풀 매트릭스(pr 플래그 포함). pull_request 면 pr==true 만, 그 외(push/dispatch)는 전체.
          # release-build: ReleaseFast 는 배포 모드 + "ReleaseFast-only 회귀" 이력이라 PR 3-OS 유지.
          #   ReleaseSafe(ubuntu 만 PR) / ReleaseSmall 은 미배포 카나리아 → PR 손실 0.
          release_full='[
            {"os":"ubuntu-latest","optimize":"ReleaseFast","pr":true},
            {"os":"macos-latest","optimize":"ReleaseFast","pr":true},
            {"os":"windows-latest","optimize":"ReleaseFast","pr":true},
            {"os":"ubuntu-latest","optimize":"ReleaseSafe","pr":true},
            {"os":"macos-latest","optimize":"ReleaseSafe","pr":false},
            {"os":"windows-latest","optimize":"ReleaseSafe","pr":false},
            {"os":"ubuntu-latest","optimize":"ReleaseSmall","pr":false},
            {"os":"macos-latest","optimize":"ReleaseSmall","pr":false},
            {"os":"windows-latest","optimize":"ReleaseSmall","pr":false}
          ]'
          # napi-package-smoke: PR 대표 5개 = 각 ABI 1개 + 32-bit ia32 카나리아(#3632 이력).
          #   arm64-gnu/musl·darwin-x64 3개는 push 에서. install/resolve 는 platform 무관이라
          #   PR 대표로 충분, arch 고유 dlopen/ABI 회귀는 push(main) 백스톱.
          # win32-arm64-msvc 는 smoke 에서 의도적 제외(arm64-windows zig 0.16.0 바이너리가
          #   네이티브 러너 segfault; cross-build 는 release.yml 검증). ia32 는 Node v24 가
          #   win-x86 폐지 → v22 + host 32-bit binary(host_zig_target) 강제.
          smoke_full='[
            {"platform":"linux-x64-gnu","os":"ubuntu-latest","zig_target":"native","pr":true},
            {"platform":"linux-arm64-gnu","os":"ubuntu-24.04-arm","zig_target":"native","pr":false},
            {"platform":"linux-x64-musl","os":"ubuntu-latest","zig_target":"x86_64-linux-musl","smoke_container":"node:24-alpine","pr":true},
            {"platform":"linux-arm64-musl","os":"ubuntu-24.04-arm","zig_target":"aarch64-linux-musl","smoke_container":"node:24-alpine","pr":false},
            {"platform":"darwin-arm64","os":"macos-latest","zig_target":"native","pr":true},
            {"platform":"darwin-x64","os":"macos-15-intel","zig_target":"native","pr":false},
            {"platform":"win32-x64-msvc","os":"windows-latest","zig_target":"native","pr":true},
            {"platform":"win32-ia32-msvc","os":"windows-latest","zig_target":"x86-windows-msvc","host_zig_target":"x86-windows-msvc","node_version":"22","node_arch":"x86","pr":true}
          ]'
          if [ "$EVENT" = "pull_request" ]; then
            release=$(jq -c '[.[] | select(.pr) | del(.pr)]' <<< "$release_full")
            smoke=$(jq -c '[.[] | select(.pr) | del(.pr)]' <<< "$smoke_full")
          else
            release=$(jq -c '[.[] | del(.pr)]' <<< "$release_full")
            smoke=$(jq -c '[.[] | del(.pr)]' <<< "$smoke_full")
          fi
          echo "release={\"include\":$release}" >> "$GITHUB_OUTPUT"
          echo "smoke={\"include\":$smoke}" >> "$GITHUB_OUTPUT"

  debug-test:
    name: Debug Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          cache-key: debug

      - name: Build (Debug)
        run: zig build

      - name: Run Tests
        # `zig build test`(--listen=- IPC)는 async runner 가 한 test 의 pass-path stderr 를
        # 인접 test 실패로 오보고한다(zig 0.16). test binary 를 직접 실행하면 sequential
        # 사람모드라 오보고가 없다. lib → exe 순차(pipefail 로 lib 실패 시 즉시 중단).
        run: |
          zig build test-bin
          ./zig-out/bin/lib-unit-test
          ./zig-out/bin/exe-unit-test
        # (Test262 runner unit test 는 lib_mod 에 포함되어 위 lib-unit-test 가 이미 커버 —
        #  별도 `zig build test262` step 은 IPC 오보고를 다시 들이므로 제거. test262.yml 의
        #  Test262 Conformance workflow 가 독립적으로 동일 직접-binary 실행을 수행한다.)

  release-build:
    name: Release Build (${{ matrix.os }}, ${{ matrix.optimize }})
    needs: setup-matrix
    runs-on: ${{ matrix.os }}
    # 매트릭스는 setup-matrix 가 event 별로 방출(PR=ReleaseFast 3-OS + ReleaseSafe
    # ubuntu = 4, push(main)=풀 3×3 = 9). job-level if 는 matrix 컨텍스트 미지원이라
    # 동적 매트릭스로 구현. 선정 근거는 setup-matrix 의 release_full 주석 참조.
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.release) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          cache-key: release-${{ matrix.optimize }}

      # Windows GitHub runner (7GB RAM) 는 Debug LLVM 메모리 상한에 걸림
      # ("LLVM ERROR: out of memory"). Debug 빌드·테스트 커버리지는 Linux/macOS
      # 에서 유지하고, Windows 에서는 Release 빌드만 검증한다.
      - name: Build (${{ matrix.optimize }})
        run: zig build -Doptimize=${{ matrix.optimize }}

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          # zig fmt --check 만 실행 — 빌드 캐시 미생성. 캐싱은 순수 오버헤드이고,
          # 키 미지정 시 전역 기본 키를 build job 들과 공유해 thrash 유발하므로 off.
          use-cache: false

      - name: Check formatting
        run: zig fmt --check src/

      # #1797 follow-up — AST Tag↔variant mismatch static audit.
      # Detects #1797 class silent failures (readers consume `data.X` while
      # parser stores a different variant). --strict-cosmetic (#1802) 도
      # 활성 — 의도된 exemption (COSMETIC_EXEMPT_TAGS) 외 모든 layout
      # mismatch 를 CI fail 로 승격.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Audit AST addNode variants (#1797, #1802)
        run: bun scripts/audit_addnode_variants.ts --strict-cosmetic

      # codegen 모든 emitter 가 첫 줄에 `addSourceMapping(node.span)` 발행하는지
      # 정적 검사. 새 emitter 추가 시 매핑 누락 회귀 (#2982 패턴) 차단 (#2983).
      - name: Audit codegen sourcemap mapping (#2983)
        run: bun scripts/audit-codegen-sourcemap.ts

      # 신규 재귀 AST walker 가 깊은 좌결합 체인(#4123)에서 스택 오버플로우를 재유입하지
      # 않도록, 모든 ast_walk.children() 호출처가 분류(iterative/one_level/tracked)됐는지 검사.
      # 미분류 신규 walker → fail. (장기 root-cause: 새 순회는 walkPreorderIterative 강제.)
      - name: Audit recursive AST walkers (#4123)
        run: bun scripts/audit-recursive-ast-walkers.mjs

      # error_codes.zig 에 코드를 추가하고 generate-error-docs.mjs 를 재실행하지 않으면
      # docsUrl() 이 존재하지 않는 페이지로 404 링크를 만든다 (#4421). 생성기를 돌려
      # 산출물이 커밋과 일치하는지 검사 — 불일치(신규/수정 페이지)면 fail.
      - name: Audit error docs sync (#4421)
        run: |
          bun scripts/generate-error-docs.mjs
          changed="$(git status --porcelain documents/src/content/docs/reference/errors documents/src/content/docs/en/reference/errors)"
          if [ -n "$changed" ]; then
            echo "::error::error 문서가 error_codes.zig 와 동기화되지 않았습니다. 'node scripts/generate-error-docs.mjs' 실행 후 커밋하세요."
            echo "$changed"
            exit 1
          fi

  napi:
    name: NAPI Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          cache-key: napi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - uses: ./.github/actions/bun-cache

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build NAPI module (Windows, MinGW ABI)
        if: runner.os == 'Windows'
        run: zig build napi --cache-dir .zig-cache-napi -Dtarget=x86_64-windows-gnu

      - name: Build NAPI module
        if: runner.os != 'Windows'
        run: zig build napi --cache-dir .zig-cache-napi

      # JS + dts 둘 다 emit. dts 는 web/server 의 `tsc --emitDeclarationOnly`
      # 가 `import { prepareAppDevSync } from "@zntc/core"` 의 declaration 을
      # resolve 할 때 필요 (#2539 PR #6d 후 web 이 core 를 typed import).
      - name: Build JS wrapper + dts
        run: cd packages/core && bun run build:js && bun run build:dts

      - name: Copy .node to package
        run: cp zig-out/lib/zntc.node packages/core/zntc.node 2>/dev/null || true

      - name: Run NAPI tests (Bun)
        run: cd packages/core && bun test index.test.ts

      - name: Run NAPI tests (Node.js)
        run: node --test packages/core/napi.test.mjs

      # CLI 테스트의 dev/preview/build app 시나리오는 spawn 한 zntc.mjs 가
      # `import("@zntc/web")` 을 호출 → packages/web/dist/index.js 필요.
      # `bun run test` 가 packages/core/package.json 의 pretest hook 을 트리거 →
      # @zntc/server + @zntc/web 빌드 → bin/zntc.test.ts 실행 (arg passthrough).
      # zntc 자체 self-build (dogfooding) 도 같이 검증 (#2539).
      - name: Run CLI tests (Bun, with @zntc/server + @zntc/web self-build via pretest)
        run: cd packages/core && bun run test bin/zntc.test.ts

      # ZNTC 코어의 ES5 다운레벨링 / chunk split runtime helper / external 처리
      # 회귀 검증 (wasm 발견 버그가 NAPI 에서도 동일 발생 확인됨). #1960~#1962
      # 는 모두 fix·CLOSED — strict 전환 완료. 스크립트가 totalFails>0 시 exit 1.
      - name: Bundler 코어 회귀 검증 (#1960~#1962 회귀 가드)
        run: bun scripts/napi-bundler-bug-check.ts

  napi-package-smoke:
    name: NAPI Package Smoke (${{ matrix.platform }})
    needs: setup-matrix
    runs-on: ${{ matrix.os }}
    # 매트릭스는 setup-matrix 가 event 별로 방출(PR=대표 5 / push=풀 8). 플랫폼 선정
    # 근거(win32-arm64 제외, ia32 node22 등)는 setup-matrix 의 smoke_full 주석 참조.
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.smoke) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          cache-key: napi-smoke-${{ matrix.platform }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version || '24' }}
          architecture: ${{ matrix.node_arch || '' }}

      - uses: ./.github/actions/bun-cache
        with:
          platform: ${{ matrix.platform }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # build:js:cjs 가 ZNTC self-host (`node bin/zntc.mjs --bundle`) — host
      # node 가 packages/core/zntc.node 를 dlopen 함. host 와 ABI 가 다른 cross
      # binary (musl 등) 는 못 읽으므로 host native 를 먼저 빌드해 두고, cross
      # 매트릭스만 그 후 target binary 로 zig-out 을 덮어 sub-package 에 복사.
      # host_zig_target 명시 entry (ia32 등) 는 host node arch 에 맞춘 cross
      # build 로 dogfood 가능하게 — windows-latest(64-bit) 에서 32-bit Node 가
      # 64-bit binary dlopen 못 함.
      - name: Build host NAPI (dogfood)
        shell: bash
        run: |
          if [ -n "${{ matrix.host_zig_target }}" ]; then
            zig build napi --cache-dir .zig-cache-napi -Dtarget=${{ matrix.host_zig_target }}
          else
            zig build napi --cache-dir .zig-cache-napi
          fi
          cp zig-out/lib/zntc.node packages/core/zntc.node

      - name: Build JS wrapper + dts
        run: cd packages/core && bun run build:js && bun run build:dts

      # host_zig_target == zig_target 인 경우 (ia32) host build 가 이미 sub-package
      # 용 binary 라 cross step 중복. zig cache 가 hit 해도 step 자체 overhead 회피.
      - name: Build platform NAPI (cross)
        if: matrix.zig_target != 'native' && matrix.zig_target != matrix.host_zig_target
        shell: bash
        run: zig build napi --cache-dir .zig-cache-napi -Dtarget=${{ matrix.zig_target }}

      - name: Copy .node into platform sub-package
        shell: bash
        run: cp zig-out/lib/zntc.node packages/core-${{ matrix.platform }}/zntc.node

      # 사용자 시나리오: npm install @zntc/core → main + 환경 매칭 sub-package 1개 install.
      # 두 tarball 같이 install 해서 loader 가 sub-package require.resolve 로 binary 찾는 흐름 검증.
      # musl 은 host(ubuntu)에서 npm pack 까지 수행 후 실행만 alpine container 로 위임.
      - name: Pack tarballs
        shell: bash
        run: |
          rm -rf tmp-napi-pack tmp-napi-smoke
          mkdir -p tmp-napi-pack tmp-napi-smoke
          main_tarball="$(npm pack ./packages/core --pack-destination tmp-napi-pack --silent | tail -n 1)"
          plat_tarball="$(npm pack ./packages/core-${{ matrix.platform }} --pack-destination tmp-napi-pack --silent | tail -n 1)"
          echo "MAIN_TARBALL=${main_tarball}" >> "$GITHUB_ENV"
          echo "PLAT_TARBALL=${plat_tarball}" >> "$GITHUB_ENV"

      # ESM resolver 는 .mjs 파일이 위치한 디렉토리 기준으로 node_modules 탐색 —
      # `node ../scripts/napi-smoke-test.mjs` 로 실행하면 repo_root/node_modules
      # (workspace symlink) 가 잡혀 dev `packages/core` 가 import 됨 → tarball
      # 검증이 무력화. `--input-type=module < <file>` 은 stdin 입력이라 cwd
      # (tmp-napi-smoke/node_modules) 기준 resolution 이 작동.
      - name: Run smoke (host)
        if: matrix.smoke_container == ''
        shell: bash
        run: |
          cd tmp-napi-smoke
          npm init -y >/dev/null
          npm install "../tmp-napi-pack/${MAIN_TARBALL}" "../tmp-napi-pack/${PLAT_TARBALL}" --ignore-scripts
          node --input-type=module < ../scripts/napi-smoke-test.mjs

      # addnab/docker-run-action@v3 은 host 의 $GITHUB_ENV 자동 forward 안 함 —
      # MAIN/PLAT_TARBALL 명시 전달 필요.
      - name: Run smoke (Alpine container, musl)
        if: matrix.smoke_container != ''
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.smoke_container }}
          options: -v ${{ github.workspace }}:/work -w /work -e MAIN_TARBALL -e PLAT_TARBALL
          run: |
            set -e
            cd tmp-napi-smoke
            npm init -y >/dev/null
            npm install "../tmp-napi-pack/${MAIN_TARBALL}" "../tmp-napi-pack/${PLAT_TARBALL}" --ignore-scripts
            node --input-type=module < ../scripts/napi-smoke-test.mjs
        env:
          MAIN_TARBALL: ${{ env.MAIN_TARBALL }}
          PLAT_TARBALL: ${{ env.PLAT_TARBALL }}

  publish-smoke:
    name: Publish Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # setup-zntc 가 zig + bun + ZNTC core build + NAPI module + core JS wrapper
      # 까지 처리. publish-smoke 는 추가로 wasm binary + JS wrapper, 그리고
      # 나머지 publishable workspace package 빌드만 하면 된다.
      - name: Setup ZNTC (core + NAPI)
        uses: ./.github/actions/setup-zntc
        with:
          cache-key: publish-smoke

      - name: Build wasm binaries
        run: zig build wasm && zig build wasm-bundler

      - name: Copy wasm + build wasm JS wrapper
        run: |
          cp zig-out/bin/zntc.wasm packages/wasm/
          cp zig-out/bin/zntc-bundler.wasm packages/wasm/
          bun run --cwd packages/wasm build:js
          bun run --cwd packages/wasm build:dts
          bun run --cwd packages/core build:dts

      - name: Build remaining publishable packages
        run: bun run build:publishable

      - name: Run publish smoke test
        run: bun run test:publish-smoke

      - name: Run publint (npm 표준 모범 사례 errors)
        run: bun run test:publint

      - name: Run sherif (workspace metadata 일관성 — license/types/packageManager 등)
        run: bun run test:sherif

      - name: Run publishable deps consistency (publishable 7 패키지 간 external dep version 통일)
        run: bun run test:publishable-deps

      - name: Run publish install test (실제 사용자 시나리오 — npm install + import)
        run: bun run test:publish-install

  wasm:
    name: WASM Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          cache-key: wasm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - uses: ./.github/actions/bun-cache

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build WASM (transpile)
        run: zig build wasm

      - name: Build WASM (bundler — #1885 Phase 2)
        run: zig build wasm-bundler

      - name: Run WASM tests
        run: cd packages/wasm && bun test

      # bundler 옵션 매트릭스 회귀 검증 — 의도된 제약 (CodeSplittingRequiresESM
      # 등) vs 새 회귀 구분. known bugs (#1960 ES5 destructuring / #1961 chunk
      # split __generator / #1962 external require) 가 fix 되기 전까지 fail
      # #1885·#1960~#1962 fix·CLOSED — strict 전환 완료. 스크립트가 진짜 회귀
      # (UNEXPECTED-FAIL/MISSING 등) 시 exit 1; 의도 제약 완화
      # (EXPECTED-FAIL-BUT-OK) 는 ::notice:: 로만 노출 (CI 미차단, 검토 대상).
