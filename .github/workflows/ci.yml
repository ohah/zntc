name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      # Windows GitHub runner (7GB RAM) 는 Debug LLVM 메모리 상한에 걸림
      # ("LLVM ERROR: out of memory"). Debug 빌드·테스트 커버리지는 Linux/macOS
      # 에서 유지하고, Windows 에서는 Release 빌드만 검증한다.
      - name: Build (Debug)
        if: runner.os != 'Windows'
        run: zig build

      - name: Run Tests
        if: runner.os != 'Windows'
        run: zig build test

      - name: Run Test262 Runner Tests
        if: runner.os != 'Windows'
        run: zig build test262

      - name: Build (ReleaseSafe)
        run: zig build -Doptimize=ReleaseSafe

      - name: Build (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast

      - name: Build (ReleaseSmall)
        run: zig build -Doptimize=ReleaseSmall

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Check formatting
        run: zig fmt --check src/

      # #1797 follow-up — AST Tag↔variant mismatch static audit.
      # Detects #1797 class silent failures (codegen reads `data.X` while
      # parser stores a different variant). Exits non-zero on real mismatch.
      # Cosmetic mismatches (layout-only) are reported but not fatal yet
      # — tracked in #1802.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Audit AST addNode variants (#1797)
        run: bun scripts/audit_addnode_variants.ts

  napi:
    name: NAPI Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install

      - name: Build NAPI module (Windows, MinGW ABI)
        if: runner.os == 'Windows'
        run: zig build napi -Dtarget=x86_64-windows-gnu

      - name: Build NAPI module
        if: runner.os != 'Windows'
        run: zig build napi

      - name: Build JS wrapper
        run: cd packages/core && bun build index.ts --outdir dist --format esm --target node

      - name: Copy .node to package
        run: cp zig-out/lib/zts.node packages/core/zts.node 2>/dev/null || true

      - name: Run NAPI tests (Bun)
        run: cd packages/core && bun test index.test.ts

      - name: Run NAPI tests (Node.js)
        run: node --test packages/core/napi.test.mjs

      - name: Run CLI tests (Bun)
        run: cd packages/core && bun test bin/zts.test.ts

  wasm:
    name: WASM Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build WASM
        run: zig build wasm

      - name: Run WASM tests
        run: cd packages/wasm && bun test
