name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  debug-test:
    name: Debug Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build (Debug)
        run: zig build

      - name: Run Tests
        run: zig build test

      - name: Run Test262 Runner Tests
        run: zig build test262

  release-build:
    name: Release Build (${{ matrix.os }}, ${{ matrix.optimize }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        optimize: [ReleaseSafe, ReleaseFast, ReleaseSmall]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      # Windows GitHub runner (7GB RAM) 는 Debug LLVM 메모리 상한에 걸림
      # ("LLVM ERROR: out of memory"). Debug 빌드·테스트 커버리지는 Linux/macOS
      # 에서 유지하고, Windows 에서는 Release 빌드만 검증한다.
      - name: Build (${{ matrix.optimize }})
        run: zig build -Doptimize=${{ matrix.optimize }}

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Check formatting
        run: zig fmt --check src/

      # #1797 follow-up — AST Tag↔variant mismatch static audit.
      # Detects #1797 class silent failures (readers consume `data.X` while
      # parser stores a different variant). --strict-cosmetic (#1802) 도
      # 활성 — 의도된 exemption (COSMETIC_EXEMPT_TAGS) 외 모든 layout
      # mismatch 를 CI fail 로 승격.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Audit AST addNode variants (#1797, #1802)
        run: bun scripts/audit_addnode_variants.ts --strict-cosmetic

  napi:
    name: NAPI Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'tests/benchmark/bun.lock', 'tests/integration/fixtures/emotion-v10/bun.lock', 'package.json', 'tests/integration/package.json', 'tests/benchmark/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install

      - name: Build NAPI module (Windows, MinGW ABI)
        if: runner.os == 'Windows'
        run: zig build napi -Dtarget=x86_64-windows-gnu

      - name: Build NAPI module
        if: runner.os != 'Windows'
        run: zig build napi

      # JS + dts 둘 다 emit. dts 는 web/server 의 `tsc --emitDeclarationOnly`
      # 가 `import { prepareAppDevSync } from "@zntc/core"` 의 declaration 을
      # resolve 할 때 필요 (#2539 PR #6d 후 web 이 core 를 typed import).
      - name: Build JS wrapper + dts
        run: cd packages/core && bun run build:js && bun run build:dts

      - name: Copy .node to package
        run: cp zig-out/lib/zntc.node packages/core/zntc.node 2>/dev/null || true

      - name: Run NAPI tests (Bun)
        run: cd packages/core && bun test index.test.ts

      - name: Run NAPI tests (Node.js)
        run: node --test packages/core/napi.test.mjs

      # CLI 테스트의 dev/preview/build app 시나리오는 spawn 한 zntc.mjs 가
      # `import("@zntc/web")` 을 호출 → packages/web/dist/index.js 필요.
      # `bun run test` 가 packages/core/package.json 의 pretest hook 을 트리거 →
      # @zntc/server + @zntc/web 빌드 → bin/zntc.test.ts 실행 (arg passthrough).
      # zntc 자체 self-build (dogfooding) 도 같이 검증 (#2539).
      - name: Run CLI tests (Bun, with @zntc/server + @zntc/web self-build via pretest)
        run: cd packages/core && bun run test bin/zntc.test.ts

      # ZNTC 코어의 ES5 다운레벨링 / chunk split runtime helper / external 처리
      # 회귀 검증 (wasm 발견 버그가 NAPI 에서도 동일 발생 확인됨). known bugs
      # 는 #1960~#1962 추적 — fix 전까지 continue-on-error 로 정보용. fix 후
      # strict 전환.
      - name: Bundler 코어 회귀 검증 (#1960~#1962)
        continue-on-error: true
        run: bun scripts/napi-bundler-bug-check.ts

  napi-package-smoke:
    name: NAPI Package Smoke (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64-gnu
            os: ubuntu-latest
            zig_target: native
          - platform: linux-arm64-gnu
            os: ubuntu-24.04-arm
            zig_target: native
          - platform: darwin-arm64
            os: macos-latest
            zig_target: native
          - platform: darwin-x64
            os: macos-15-intel
            zig_target: native
          - platform: win32-x64-gnu
            os: windows-latest
            zig_target: x86_64-windows-gnu
          - platform: win32-x64-msvc
            os: windows-latest
            zig_target: x86_64-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ matrix.platform }}-bun-${{ hashFiles('bun.lock', 'tests/benchmark/bun.lock', 'tests/integration/fixtures/emotion-v10/bun.lock', 'package.json', 'tests/integration/package.json', 'tests/benchmark/package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform }}-bun-
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Build NAPI module
        shell: bash
        run: |
          if [ "${{ matrix.zig_target }}" = "native" ]; then
            zig build napi
          else
            zig build napi -Dtarget=${{ matrix.zig_target }}
          fi

      - name: Build JS wrapper + dts
        run: cd packages/core && bun run build:js && bun run build:dts

      - name: Copy .node into package
        run: |
          node -e "const fs=require('node:fs'); const from=['zig-out/lib/zntc.node','zig-out/bin/zntc.node'].find(fs.existsSync); if(!from) throw new Error('zntc.node build artifact not found'); fs.copyFileSync(from, 'packages/core/zntc.node');"

      - name: Pack and run installed package
        shell: bash
        run: |
          rm -rf tmp-napi-pack tmp-napi-smoke
          mkdir -p tmp-napi-pack tmp-napi-smoke
          tarball="$(npm pack ./packages/core --pack-destination tmp-napi-pack --silent | tail -n 1)"
          cd tmp-napi-smoke
          npm init -y >/dev/null
          npm install "../tmp-napi-pack/${tarball}" --ignore-scripts --omit=optional
          node --input-type=module <<'EOF'
          import { init, tokenize, transpile } from "@zntc/core";

          init();

          const result = transpile("const value: number = 1;", { filename: "input.ts" });
          if (!result.code.includes("const value = 1")) {
            throw new Error(`unexpected transpile output: ${result.code}`);
          }

          const tokens = tokenize("const x = 1;", { filename: "input.ts" });
          if (!Array.isArray(tokens) || tokens.length === 0) {
            throw new Error("tokenize returned no tokens");
          }
          EOF

  publish-smoke:
    name: Publish Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'tests/benchmark/bun.lock', 'tests/integration/fixtures/emotion-v10/bun.lock', 'package.json', 'tests/integration/package.json', 'tests/benchmark/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      # publish-smoke 의 검증 대상은 tarball 의 layout / exports / files / deps —
      # NAPI binary (.node) 와 wasm 바이너리 자체 동작은 별도 job 책임. JS dist 만
      # 있으면 검증 충분 (smoke test 는 파일 존재 + package.json 만 본다).
      - name: Build NAPI module + wasm (binary 산출 — JS wrapper 가 require)
        run: zig build napi && zig build wasm && zig build wasm-bundler

      - name: Build all publishable packages
        run: |
          cp zig-out/lib/zntc.node packages/core/zntc.node
          bun run --cwd packages/core build:js
          bun run --cwd packages/core build:dts
          cp zig-out/bin/zntc.wasm packages/wasm/
          cp zig-out/bin/zntc-bundler.wasm packages/wasm/
          bun run --cwd packages/wasm build:js
          bun run --cwd packages/wasm build:dts
          bun run --cwd packages/server build
          bun run --cwd packages/web build
          bun run --cwd packages/react-native build
          bun run --cwd packages/vite-plugin-zntc build
          bun run --cwd packages/init build

      - name: Run publish smoke test
        run: bun scripts/publish-smoke-test.ts

  wasm:
    name: WASM Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'tests/benchmark/bun.lock', 'tests/integration/fixtures/emotion-v10/bun.lock', 'package.json', 'tests/integration/package.json', 'tests/benchmark/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Build WASM (transpile)
        run: zig build wasm

      - name: Build WASM (bundler — #1885 Phase 2)
        run: zig build wasm-bundler

      - name: Run WASM tests
        run: cd packages/wasm && bun test

      # bundler 옵션 매트릭스 회귀 검증 — 의도된 제약 (CodeSplittingRequiresESM
      # 등) vs 새 회귀 구분. known bugs (#1960 ES5 destructuring / #1961 chunk
      # split __generator / #1962 external require) 가 fix 되기 전까지 fail
      # 가능 — continue-on-error 로 정보용. fix 후 strict 로 전환.
      - name: Bundler 매트릭스 회귀 검증 (#1885 follow-up)
        continue-on-error: true
        run: bun scripts/wasm-bundler-full-matrix.ts
