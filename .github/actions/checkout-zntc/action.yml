name: Checkout ZNTC with shallow submodules
description: |
  actions/checkout 후 모든 submodule 을 depth=1 로 init. BoringSSL submodule
  (vendor/boringssl, ~227MB) 의 full history clone 회피 (#2538 4-1 review). 기존
  `actions/checkout@v4 + submodules: recursive` 대비 fetch 시간/네트워크 절감.

inputs:
  fetch-depth:
    # ⚠ actions/checkout 의 default (0=full history) 와 다름. 본 composite 의 default
    # 는 1 — git log / git describe / `LAST_TAG..HEAD` 같이 history 가 필요한
    # caller 는 명시적으로 '0' 을 전달해야 한다.
    description: 'fetch-depth for main repo (default: 1 shallow, 0 = full history)'
    required: false
    default: '1'

runs:
  using: composite
  steps:
    - name: Checkout (without submodules)
      uses: actions/checkout@v4
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
        submodules: false

    - name: Init submodules (shallow)
      shell: bash
      run: git submodule update --init --depth 1 --recommend-shallow
