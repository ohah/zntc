name: Use ZNTC Artifact
description: Install Bun and restore prebuilt ZNTC artifacts for CI jobs.

inputs:
  artifact-name:
    description: Name of the uploaded ZNTC build artifact.
    required: true
  bun-version:
    description: Bun version to install.
    required: false
    default: "1.3.11"
  napi:
    description: Verify that the artifact includes NAPI and core JS wrapper outputs.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - uses: ./.github/actions/bun-cache

    - name: Download ZNTC build artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: .

    - name: Normalize CLI artifact layout
      run: |
        if [ ! -e zig-out/bin/zntc ] && [ -e zntc ]; then
          mkdir -p zig-out/bin
          mv zntc zig-out/bin/zntc
        fi
      shell: bash

    - name: Restore executable bit
      if: ${{ runner.os != 'Windows' }}
      run: chmod +x zig-out/bin/zntc
      shell: bash

    - name: Verify ZNTC artifact
      run: |
        test -x zig-out/bin/zntc
      shell: bash

    - name: Verify NAPI artifact
      if: ${{ inputs.napi == 'true' }}
      run: |
        test -f zig-out/lib/zntc.node
        test -f packages/core/dist/index.js
      shell: bash
